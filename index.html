<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LuminaCode AI | Professional Workspace</title>
    
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/theme/dracula.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/xml/xml.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/javascript/javascript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/css/css.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/htmlmixed/htmlmixed.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root { --bg: #050505; --surface: #0f0f12; --accent: #8b5cf6; --border: #27272a; --text: #fafafa; }
        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* Navbar */
        nav { height: 70px; background: var(--surface); display: flex; align-items: center; justify-content: space-between; padding: 0 25px; border-bottom: 2px solid var(--accent); z-index: 1000; flex-shrink: 0; }
        .nav-left, .nav-right { display: flex; align-items: center; gap: 15px; }
        
        #user-profile { display: none; align-items: center; gap: 12px; background: rgba(139, 92, 246, 0.1); padding: 5px 15px; border-radius: 30px; border: 1px solid var(--border); }
        #u-avatar { width: 32px; height: 32px; border-radius: 50%; border: 1px solid var(--accent); }

        /* App Layout */
        .app-main { display: flex; flex: 1; overflow: hidden; }
        .sidebar { width: 400px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 18px; gap: 12px; transition: 0.3s; z-index: 900; }
        .sidebar.closed { margin-left: -400px; }

        /* Chat UI */
        #chat-stream { flex: 1; background: #070708; border: 1px solid var(--border); border-radius: 10px; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; font-size: 13px; }
        .msg { padding: 10px 14px; border-radius: 12px; max-width: 85%; line-height: 1.4; word-wrap: break-word; }
        .ai-msg { background: #1a1a1e; color: #ccc; align-self: flex-start; border: 1px solid #333; }
        .user-msg { background: var(--accent); color: white; align-self: flex-end; }

        /* Input Controls */
        .field { background: #111; border: 1px solid var(--border); color: white; padding: 12px; border-radius: 8px; width: 100%; box-sizing: border-box; font-size: 13px; outline: none; transition: 0.2s; }
        .field:focus { border-color: var(--accent); }
        
        .btn { border: none; color: white; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: 800; display: flex; align-items: center; justify-content: center; gap: 8px; font-size: 11px; text-transform: uppercase; transition: 0.2s; }
        .btn-primary { background: var(--accent); width: 100%; font-size: 12px; box-shadow: 0 4px 12px rgba(139, 92, 246, 0.2); }
        .btn:hover { filter: brightness(1.1); transform: translateY(-1px); }

        /* Editor & Preview */
        .workspace { flex: 1; display: flex; flex-direction: column; background: #000; overflow: hidden; }
        .tab-bar { background: #0d0d0f; display: flex; border-bottom: 1px solid var(--border); }
        .tab { padding: 14px 22px; cursor: pointer; font-size: 12px; color: #555; border-right: 1px solid var(--border); font-weight: bold; }
        .tab.active { background: var(--surface); color: var(--accent); border-bottom: 2px solid var(--accent); }

        .editor-wrap { flex: 1; min-height: 0; }
        .CodeMirror { height: 100% !important; font-size: 14px; }

        .preview-pane { height: 40%; background: white; position: relative; border-top: 4px solid var(--border); }
        .preview-pane.fs { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 2000; }
        iframe { width: 100%; height: 100%; border: none; }
        .fs-btn { position: absolute; top: 10px; right: 10px; z-index: 2100; background: #000; color: #fff; border: 1px solid #444; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 10px; }
    </style>
</head>
<body>

<nav>
    <div class="nav-left">
        <button class="btn" style="background:#1a1a1e;" onclick="toggleSide()"><i data-lucide="menu"></i></button>
        <span style="font-weight: 900; letter-spacing: 2px; color: var(--accent);">LUMINACODE AI</span>
    </div>
    <div class="nav-right">
        <div id="g_id_onload" data-client_id="951427019725-o73a2mgth6qnd9bufkp6kjunn583u0k5.apps.googleusercontent.com" data-callback="onSignIn"></div>
        <div class="g_id_signin" data-type="standard" data-shape="pill"></div>
        <div id="user-profile">
            <span id="u-name" style="font-size:12px; font-weight:bold;"></span>
            <img id="u-avatar" referrerpolicy="no-referrer">
        </div>
    </div>
</nav>

<div class="app-main">
    <aside class="sidebar" id="sidebar">
        <div id="chat-stream">
            <div class="msg ai-msg"><b>LuminaCode AI:</b> System Ready. How can I help you today?</div>
        </div>
        
        <input type="text" id="project-name" class="field" placeholder="Project Name...">
        <input type="password" id="gemini-key" class="field" placeholder="Gemini API Key...">
        <select id="model-list" class="field"><option value="">Sync to load models...</option></select>
        <textarea id="prompt-input" class="field" style="height: 100px; resize: none;" placeholder="Enter build instructions..."></textarea>
        
        <button class="btn btn-primary" onclick="generate()"><i data-lucide="send"></i> SEND COMMAND</button>
        
        <div style="display:flex; gap:8px;">
            <button class="btn" style="background:#111; border:1px solid #333; flex:1;" onclick="sync()">SYNC API</button>
            <button class="btn" style="background:#111; border:1px solid #333; flex:1;" onclick="exportZip()">ZIP</button>
        </div>
    </aside>

    <main class="workspace">
        <div class="tab-bar">
            <div class="tab active" id="t-html" onclick="setFile('html')">index.html</div>
            <div class="tab" id="t-css" onclick="setFile('css')">style.css</div>
            <div class="tab" id="t-js" onclick="setFile('js')">script.js</div>
        </div>
        <div class="editor-wrap"><textarea id="code-editor"></textarea></div>
        <div class="preview-pane" id="preview-wrap">
            <button class="fs-btn" onclick="toggleFS()">FULLSCREEN</button>
            <iframe id="output"></iframe>
        </div>
    </main>
</div>

<script>
    lucide.createIcons();
    let current = 'html', logs = [], userData = { name: 'User' };
    let files = { html: '', css: '', js: '' };

    const editor = CodeMirror.fromTextArea(document.getElementById('code-editor'), {
        theme: "dracula", lineNumbers: true, mode: "htmlmixed", lineWrapping: true
    });

    function toggleSide() { document.getElementById('sidebar').classList.toggle('closed'); }
    function toggleFS() { document.getElementById('preview-wrap').classList.toggle('fs'); }

    function setFile(type) {
        files[current] = editor.getValue();
        current = type;
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById(`t-${type}`).classList.add('active');
        const m = { html: 'htmlmixed', css: 'css', js: 'javascript' };
        editor.setOption('mode', m[type]);
        editor.setValue(files[type] || '');
        editor.refresh();
    }

    function onSignIn(resp) {
        const data = JSON.parse(atob(resp.credential.split('.')[1]));
        userData.name = data.name;
        document.querySelector('.g_id_signin').style.display = 'none';
        document.getElementById('user-profile').style.display = 'flex';
        document.getElementById('u-name').innerText = data.name.toUpperCase();
        document.getElementById('u-avatar').src = data.picture;
        post("AI", `Welcome, ${data.given_name}. System initialized.`);
    }

    async function sync() {
        const key = document.getElementById('gemini-key').value;
        localStorage.setItem('lumina_v6_key', key);
        try {
            const r = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${key}`);
            const d = await r.json();
            const s = document.getElementById('model-list');
            s.innerHTML = '';
            d.models.forEach(m => {
                if(m.supportedGenerationMethods.includes("generateContent")) {
                    const o = document.createElement('option');
                    o.value = m.name.split('/').pop(); o.innerText = o.value;
                    if(o.value.includes('flash')) o.selected = true;
                    s.appendChild(o);
                }
            });
            post("AI", "Models synchronized successfully.");
        } catch(e) { post("AI", "Sync error. Check Key."); }
    }

    function post(role, text) {
        const w = document.getElementById('chat-stream');
        const d = document.createElement('div');
        d.className = `msg ${role === 'User' ? 'user-msg' : 'ai-msg'}`;
        d.innerHTML = `<b>${role}:</b> ${text}`;
        w.appendChild(d); w.scrollTop = w.scrollHeight;
    }

    async function generate() {
        const p = document.getElementById('prompt-input').value;
        const key = document.getElementById('gemini-key').value;
        const m = document.getElementById('model-list').value;
        if(!p || !key) return;

        post("User", p);
        document.getElementById('prompt-input').value = '';
        logs.push({ role: "user", parts: [{ text: p }] });

        try {
            const r = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${m}:generateContent?key=${key}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [
                        { role: "user", parts: [{ text: `IDENTITY: LuminaCode AI. User: ${userData.name}. Task: Build professional web code. Tags: [STORY], [HTML], [CSS], [JS]. Be neutral and efficient.` }]},
                        ...logs.slice(-10)
                    ]
                })
            });
            const d = await r.json();
            const raw = d.candidates[0].content.parts[0].text;
            logs.push({ role: "model", parts: [{ text: raw }] });

            const story = raw.match(/\[STORY\](.*?)\[\/STORY\]/s)?.[1] || raw;
            files.html = raw.match(/\[HTML\](.*?)\[\/HTML\]/s)?.[1] || files.html;
            files.css = raw.match(/\[CSS\](.*?)\[\/CSS\]/s)?.[1] || files.css;
            files.js = raw.match(/\[JS\](.*?)\[\/JS\]/s)?.[1] || files.js;
            
            post("AI", story.trim());
            render();
        } catch(e) { post("AI", "Engine error."); }
    }

    function render() {
        editor.setValue(files[current]);
        const w = document.getElementById('output').contentWindow.document;
        w.open();
        w.write(`${files.html}<style>${files.css}</style><script>${files.js}<\/script>`);
        w.close();
    }

    function exportZip() {
        const zip = new JSZip();
        zip.file("index.html", files.html); zip.file("style.css", files.css); zip.file("script.js", files.js);
        zip.generateAsync({type:"blob"}).then(b => {
            const a = document.createElement('a'); a.href = URL.createObjectURL(b);
            a.download = `${document.getElementById('project-name').value || 'Source'}.zip`; a.click();
        });
    }

    document.getElementById('gemini-key').value = localStorage.getItem('lumina_v6_key') || '';
    editor.on('change', () => { 
        files[current] = editor.getValue(); 
        const w = document.getElementById('output').contentWindow.document;
        w.open(); w.write(`${files.html}<style>${files.css}</style><script>${files.js}<\/script>`); w.close();
    });
</script>
</body>
</html>
