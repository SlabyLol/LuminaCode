<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LuminaCode | Tactical Workspace</title>
    
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/theme/dracula.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/xml/xml.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/javascript/javascript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/css/css.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/htmlmixed/htmlmixed.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root { 
            --bg: #020204; 
            --sidebar: #08080b; 
            --accent: #8b5cf6; 
            --border: #18181d; 
            --text: #f0f0f0; 
            --accent-glow: rgba(139, 92, 246, 0.4);
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
        }
        
        /* Navbar */
        nav { 
            height: 60px; 
            background: var(--sidebar); 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            padding: 0 20px; 
            border-bottom: 2px solid var(--accent); 
            z-index: 1000; 
        }
        
        .logo-box { 
            display: flex; 
            align-items: center; 
            gap: 12px; 
            font-weight: 900; 
            letter-spacing: 5px; 
            color: var(--accent); 
        }
        
        .hidden { display: none !important; }
        .app-shell { display: flex; flex: 1; overflow: hidden; }
        
        /* Sidebar System */
        .sidebar { 
            width: 420px; 
            background: var(--sidebar); 
            border-right: 1px solid var(--border); 
            display: flex; 
            flex-direction: column; 
            transition: 0.3s ease; 
            z-index: 900; 
        }
        
        .sidebar.collapsed { margin-left: -420px; }

        /* Stealth Identity - Always Hidden initially */
        .identity-wrap { 
            padding: 15px; 
            border-bottom: 1px solid var(--border); 
            background: #050507; 
        }
        
        .id-trigger { 
            font-size: 10px; 
            font-weight: 900; 
            color: #444; 
            text-transform: uppercase; 
            cursor: pointer; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
        }
        
        #id-content { 
            margin-top: 12px; 
            display: flex; 
            align-items: center; 
            gap: 12px; 
            padding: 10px; 
            background: #000; 
            border-radius: 8px; 
            border: 1px solid var(--border); 
        }
        
        #u-avatar { 
            width: 32px; 
            height: 32px; 
            border-radius: 50%; 
            border: 1px solid var(--accent); 
        }
        
        #u-name { font-size: 11px; font-weight: 800; color: #fff; }

        /* Live Chat Engine */
        #chat-window { 
            flex: 1; 
            background: #000; 
            padding: 20px; 
            overflow-y: auto; 
            display: flex; 
            flex-direction: column; 
            gap: 15px; 
            font-size: 13px; 
        }
        
        .msg { 
            padding: 12px 16px; 
            border-radius: 12px; 
            max-width: 85%; 
            line-height: 1.5; 
        }
        
        .ai-msg { 
            background: #0d0d12; 
            color: #ccc; 
            align-self: flex-start; 
            border: 1px solid #1a1a22; 
            border-left: 3px solid var(--accent); 
        }
        
        .user-msg { 
            background: var(--accent); 
            color: white; 
            align-self: flex-end; 
            box-shadow: 0 4px 15px var(--accent-glow); 
        }

        /* Controls */
        .controls { 
            padding: 20px; 
            background: var(--sidebar); 
            display: flex; 
            flex-direction: column; 
            gap: 10px; 
            border-top: 1px solid var(--border); 
        }
        
        .input-box { 
            background: #000; 
            border: 1px solid var(--border); 
            color: white; 
            padding: 12px; 
            border-radius: 8px; 
            width: 100%; 
            font-size: 12px; 
            outline: none; 
        }
        
        .input-box:focus { border-color: var(--accent); }
        
        .btn { 
            border: none; 
            color: white; 
            padding: 14px; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: 800; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 10px; 
            font-size: 11px; 
            text-transform: uppercase; 
        }
        
        .btn-execute { background: linear-gradient(135deg, var(--accent), #6d28d9); width: 100%; }
        .btn-row { display: flex; gap: 8px; }
        .btn-sec { background: #16161c; border: 1px solid var(--border); flex: 1; }

        /* Editor Space */
        .editor-space { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            background: #000; 
            overflow: hidden; 
        }
        
        .tab-bar { 
            background: #07070a; 
            display: flex; 
            border-bottom: 1px solid var(--border); 
            align-items: center; 
        }
        
        .tab { 
            padding: 15px 25px; 
            cursor: pointer; 
            font-size: 11px; 
            color: #444; 
            border-right: 1px solid var(--border); 
            font-weight: 900; 
        }
        
        .tab.active { 
            background: var(--sidebar); 
            color: var(--accent); 
            border-bottom: 2px solid var(--accent); 
        }

        .cm-wrap { flex: 1; min-height: 0; }
        .CodeMirror { height: 100% !important; font-size: 15px; }

        /* Live Preview */
        .preview-space { 
            height: 40%; 
            background: white; 
            position: relative; 
            border-top: 5px solid var(--border); 
        }
        
        .preview-space.maximized { 
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 2000; 
        }
        
        iframe { width: 100%; height: 100%; border: none; }
        
        .float-bar { 
            position: absolute; top: 15px; right: 25px; z-index: 2100; display: flex; gap: 8px; 
        }
        
        .tool-btn { 
            background: rgba(0,0,0,0.8); color: #fff; border: 1px solid #444; 
            padding: 8px 14px; border-radius: 5px; cursor: pointer; font-size: 10px; font-weight: 900; 
        }
    </style>
</head>
<body>

<nav>
    <div class="logo-box">
        <button class="btn" style="background:transparent; padding:0;" onclick="toggleSidebar()"><i data-lucide="menu"></i></button>
        <div style="background: var(--accent); width: 4px; height: 20px;"></div>
        <span>LUMINACODE</span>
    </div>
    <div class="nav-right">
        <div id="g_id_onload" data-client_id="951427019725-o73a2mgth6qnd9bufkp6kjunn583u0k5.apps.googleusercontent.com" data-callback="onAuth"></div>
        <div class="g_id_signin" data-type="icon" data-shape="circle" data-theme="filled_black"></div>
    </div>
</nav>

<div class="app-shell">
    <aside class="sidebar" id="sidebar">
        <div class="identity-wrap">
            <div class="id-trigger" onclick="toggleAcc()">
                <span>System Identity</span>
                <i data-lucide="shield" style="width:14px;"></i>
            </div>
            <div id="id-content" class="hidden">
                <img id="u-avatar" src="" referrerpolicy="no-referrer" class="hidden">
                <span id="u-name">USER</span>
            </div>
        </div>

        <div id="chat-window">
            <div class="msg ai-msg"><b>LuminaCode AI:</b> Environment secured. Live-Chat active. Standing by for User instructions.</div>
        </div>

        <div class="controls">
            <input type="text" id="project-id" class="input-box" placeholder="Project Workspace Title...">
            <input type="password" id="api-key" class="input-box" placeholder="Gemini API Key...">
            <select id="model-select" class="input-box"><option value="">Connect Key to Sync...</option></select>
            <textarea id="ai-prompt" class="input-box" style="height: 100px; resize: none;" placeholder="Chat message or Build prompt..."></textarea>
            
            <button class="btn btn-execute" onclick="executeAI()"><i data-lucide="zap"></i> EXECUTE</button>
            
            <div class="btn-row">
                <button class="btn btn-sec" onclick="syncEngine()"><i data-lucide="refresh-cw"></i> SYNC</button>
                <button class="btn btn-sec" onclick="exportZIP()"><i data-lucide="download"></i> ZIP</button>
            </div>
            <button class="btn" style="background:#221111; color:#ff5555; border:1px solid #422; font-size:9px; margin-top:5px;" onclick="resetContext()">RESET SESSION</button>
        </div>
    </aside>

    <main class="editor-space">
        <div class="tab-bar">
            <div class="tab active" id="tab-html" onclick="switchFile('html')">INDEX.HTML</div>
            <div class="tab" id="tab-css" onclick="switchFile('css')">STYLE.CSS</div>
            <div class="tab" id="tab-js" onclick="switchFile('js')">SCRIPT.JS</div>
        </div>
        
        <div class="cm-wrap"><textarea id="editor"></textarea></div>
        
        <div class="preview-space" id="p-wrap">
            <div class="float-bar">
                <button class="tool-btn" onclick="render()">RE-RENDER</button>
                <button class="tool-btn" onclick="toggleMaximize()">FULLSCREEN</button>
            </div>
            <iframe id="preview"></iframe>
        </div>
    </main>
</div>

<script>
    lucide.createIcons();
    let curFile = 'html', chatHistory = [];
    let files = { 
        html: '<!DOCTYPE html>\n<html>\n<head>\n  <title>LuminaCode</title>\n</head>\n<body>\n  <h1>Ready for Input</h1>\n</body>\n</html>', 
        css: 'body { background: #000; color: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: sans-serif; }', 
        js: '// Logic goes here' 
    };

    const cm = CodeMirror.fromTextArea(document.getElementById('editor'), {
        theme: "dracula", lineNumbers: true, mode: "htmlmixed", lineWrapping: true
    });

    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('collapsed'); }
    function toggleAcc() { document.getElementById('id-content').classList.toggle('hidden'); }
    function toggleMaximize() { document.getElementById('p-wrap').classList.toggle('maximized'); }
    
    function resetContext() { 
        chatHistory = []; 
        document.getElementById('chat-window').innerHTML = '<div class="msg ai-msg"><b>LuminaCode AI:</b> Context purged. Memory reset.</div>'; 
    }

    function switchFile(type) {
        files[curFile] = cm.getValue(); 
        curFile = type;
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById(`tab-${type}`).classList.add('active');
        
        const map = { html: 'htmlmixed', css: 'css', js: 'javascript' };
        cm.setOption('mode', map[type]); 
        cm.setValue(files[type]); 
        cm.refresh();
    }

    function onAuth(resp) {
        const u = JSON.parse(atob(resp.credential.split('.')[1]));
        document.getElementById('u-name').innerText = "USER"; // Stealth: Do not display actual name
        document.getElementById('u-avatar').src = u.picture;
        document.getElementById('u-avatar').classList.remove('hidden');
        addChat("System", "Identity authorized and verified.");
    }

    async function syncEngine() {
        const k = document.getElementById('api-key').value;
        localStorage.setItem('lumina_stealth_key', k);
        try {
            const r = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${k}`);
            const d = await r.json();
            const s = document.getElementById('model-select'); 
            s.innerHTML = '';
            
            d.models.forEach(m => {
                if(m.supportedGenerationMethods.includes("generateContent")) {
                    const o = document.createElement('option');
                    o.value = m.name.split('/').pop(); 
                    o.innerText = o.value;
                    if(o.value.includes('flash')) o.selected = true;
                    s.appendChild(o);
                }
            });
            addChat("System", "Engine synced. Ready.");
        } catch(e) { addChat("System", "Sync Error. Check API Key."); }
    }

    function addChat(role, text) {
        const box = document.getElementById('chat-window');
        const d = document.createElement('div');
        d.className = `msg ${role === 'User' ? 'user-msg' : 'ai-msg'}`;
        d.innerHTML = `<b>${role}:</b> ${text}`;
        box.appendChild(d); 
        box.scrollTop = box.scrollHeight;
    }

    async function executeAI() {
        const p = document.getElementById('ai-prompt').value;
        const k = document.getElementById('api-key').value;
        const m = document.getElementById('model-select').value;
        
        if(!p || !k) return;

        addChat("User", p);
        document.getElementById('ai-prompt').value = '';
        chatHistory.push({ role: "user", parts: [{ text: p }] });

        const systemPrompt = "IDENTITY: LuminaCode AI. Company: DarkFox Co. " + 
                             "Context: Tobias is the boss and the best coder in the crew. Crew members: Denis, Simon, Liam. " +
                             "Display Context: Address as User. Rules: Full professional code. " +
                             "Formatting: [STORY], [HTML], [CSS], [JS]. Language: Use the language of the user prompt.";

        try {
            const r = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${m}:generateContent?key=${k}`, {
                method: 'POST', 
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [
                        { role: "user", parts: [{ text: systemPrompt }]},
                        ...chatHistory.slice(-14)
                    ]
                })
            });
            
            const d = await r.json();
            const raw = d.candidates[0].content.parts[0].text;
            chatHistory.push({ role: "model", parts: [{ text: raw }] });

            const story = raw.match(/\[STORY\](.*?)\[\/STORY\]/s)?.[1] || raw;
            files.html = raw.match(/\[HTML\](.*?)\[\/HTML\]/s)?.[1] || files.html;
            files.css = raw.match(/\[CSS\](.*?)\[\/CSS\]/s)?.[1] || files.css;
            files.js = raw.match(/\[JS\](.*?)\[\/JS\]/s)?.[1] || files.js;
            
            addChat("LuminaCode", story.trim());
            render();
        } catch(e) { addChat("System", "Execution error."); }
    }

    function render() {
        cm.setValue(files[curFile]);
        const w = document.getElementById('preview').contentWindow.document;
        w.open(); 
        w.write(`${files.html}<style>${files.css}</style><script>${files.js}<\/script>`); 
        w.close();
    }

    function exportZIP() {
        const zip = new JSZip();
        zip.file("index.html", files.html); 
        zip.file("style.css", files.css); 
        zip.file("script.js", files.js);
        
        zip.generateAsync({type:"blob"}).then(b => {
            const a = document.createElement('a'); 
            a.href = URL.createObjectURL(b);
            a.download = `${document.getElementById('project-id').value || 'Build'}.zip`; 
            a.click();
        });
    }

    // Init values
    document.getElementById('api-key').value = localStorage.getItem('lumina_stealth_key') || '';
    cm.setValue(files[curFile]);
    
    // Auto update preview on editor change
    cm.on('change', () => { 
        files[curFile] = cm.getValue(); 
        const w = document.getElementById('preview').contentWindow.document;
        w.open(); 
        w.write(`${files.html}<style>${files.css}</style><script>${files.js}<\/script>`); 
        w.close();
    });
</script>
</body>
</html>
