<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LuminaCode AI | Pro</title>
    <link rel="icon" type="image/jpeg" href="logo.jpeg">
    
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/theme/dracula.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/htmlmixed/htmlmixed.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root { --bg: #050505; --surface: #0f0f12; --accent: #8b5cf6; --border: #27272a; --text: #fafafa; }
        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* Navbar & Account View */
        nav { height: 75px; background: var(--surface); display: flex; align-items: center; justify-content: space-between; padding: 0 25px; border-bottom: 2px solid var(--accent); }
        .logo-section { display: flex; align-items: center; gap: 15px; }
        .app-logo { width: 45px; height: 45px; border-radius: 12px; border: 2px solid var(--border); box-shadow: 0 0 15px rgba(139, 92, 246, 0.4); }
        
        .account-area { display: flex; align-items: center; gap: 15px; min-width: 200px; justify-content: flex-end; }
        #user-info { display: none; align-items: center; gap: 10px; background: #1a1a20; padding: 8px 15px; border-radius: 50px; border: 1px solid var(--accent); box-shadow: 0 0 10px var(--accent); }
        #u-img { width: 32px; height: 32px; border-radius: 50%; border: 1px solid white; }
        
        /* Sidebar */
        .main-layout { display: flex; flex: 1; overflow: hidden; }
        .sidebar { width: 350px; background: var(--surface); border-right: 1px solid var(--border); padding: 25px; display: flex; flex-direction: column; gap: 20px; }
        .input-field, select { background: #070708; border: 1px solid var(--border); color: white; padding: 12px; border-radius: 10px; width: 100%; outline: none; }
        .btn { background: var(--accent); border: none; color: white; padding: 15px; border-radius: 10px; cursor: pointer; font-weight: 700; width: 100%; }
        
        .workspace { flex: 1; display: grid; grid-template-rows: 1fr 1fr; }
        .CodeMirror { height: 100% !important; }
        iframe { width: 100%; height: 100%; border: none; background: white; }
    </style>
</head>
<body>

<nav>
    <div class="logo-section">
        <img src="logo.jpeg" alt="L" class="app-logo" onerror="this.src='https://api.dicebear.com/7.x/bottts/svg?seed=Lumina'">
        <h2 style="margin:0; font-size: 1.2rem;">LuminaCode AI</h2>
    </div>

    <div class="account-area">
        <div id="g_id_onload" data-client_id="951427019725-o73a2mgth6qnd9bufkp6kjunn583u0k5.apps.googleusercontent.com" data-callback="handleSignIn"></div>
        <div class="g_id_signin" data-type="standard"></div>
        
        <div id="user-info">
            <span id="u-name" style="font-weight: 600;"></span>
            <img id="u-img" referrerpolicy="no-referrer">
        </div>
    </div>
</nav>

<div class="main-layout">
    <aside class="sidebar">
        <div>
            <label style="font-size: 0.7rem; color: #71717a;">API KEY (Saved in Browser)</label>
            <div style="position:relative;">
                <input type="password" id="api-key" class="input-field" placeholder="Paste Key...">
                <button onclick="toggleKey()" style="position:absolute; right:10px; top:10px; background:none; border:none; color:#71717a; cursor:pointer;"><i data-lucide="eye"></i></button>
            </div>
            <button class="btn" style="background:#27272a; margin-top:5px; padding:8px;" onclick="fetchModels()">Refresh Models</button>
        </div>

        <div>
            <label style="font-size: 0.7rem; color: #71717a;">SELECT MODEL</label>
            <select id="model-list">
                <option value="gemini-1.5-flash">gemini-1.5-flash (Default)</option>
            </select>
        </div>
        
        <textarea id="ai-prompt" class="input-field" style="height: 120px;" placeholder="Build a login page..."></textarea>
        <button class="btn" onclick="generateCode()">GENERATE CODE</button>
        <div id="status" style="font-size:12px; text-align:center;"></div>
    </aside>

    <div class="workspace">
        <textarea id="editor"></textarea>
        <iframe id="preview"></iframe>
    </div>
</div>

<script>
    lucide.createIcons();
    const editor = CodeMirror.fromTextArea(document.getElementById('editor'), { mode: "htmlmixed", theme: "dracula", lineNumbers: true });
    
    // Load saved Key
    document.getElementById('api-key').value = localStorage.getItem('gemini_key') || '';

    function toggleKey() {
        const input = document.getElementById('api-key');
        input.type = input.type === "password" ? "text" : "password";
    }

    // AUTH FIX
    function handleSignIn(response) {
        const data = JSON.parse(atob(response.credential.split('.')[1]));
        document.querySelector('.g_id_signin').style.display = 'none';
        document.getElementById('user-info').style.display = 'flex';
        document.getElementById('u-name').innerText = data.name;
        document.getElementById('u-img').src = data.picture;
    }

    // MODEL FINDER FIX
    async function fetchModels() {
        const key = document.getElementById('api-key').value.trim();
        if(!key) return alert("Enter Key first!");
        try {
            const r = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${key}`);
            const data = await r.json();
            const select = document.getElementById('model-list');
            select.innerHTML = '';
            data.models.forEach(m => {
                if(m.supportedGenerationMethods.includes("generateContent")) {
                    const opt = document.createElement('option');
                    opt.value = m.name.split('/').pop();
                    opt.innerText = opt.value;
                    select.appendChild(opt);
                }
            });
            alert("Models updated! Check the list.");
        } catch(e) { alert("Could not fetch models. Key might be wrong."); }
    }

    async function generateCode() {
        const key = document.getElementById('api-key').value.trim();
        const model = document.getElementById('model-list').value;
        const prompt = document.getElementById('ai-prompt').value;
        const status = document.getElementById('status');
        
        localStorage.setItem('gemini_key', key);
        status.innerText = "Processing...";

        try {
            const r = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${key}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: `Code only: ${prompt}` }] }] })
            });
            const data = await r.json();
            if(data.error) throw new Error(data.error.message);
            let code = data.candidates[0].content.parts[0].text.replace(/```html|```javascript|```css|```/gi, "").trim();
            editor.setValue(code);
            const doc = document.getElementById('preview').contentWindow.document;
            doc.open(); doc.write(code); doc.close();
            status.innerText = "Done! ✅";
        } catch (e) { status.innerText = "Error: " + e.message; }
    }
</script>
</body>
</html>
