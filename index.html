<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LuminaCode AI | Pro Workspace</title>
    
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/theme/dracula.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/xml/xml.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/javascript/javascript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/css/css.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/htmlmixed/htmlmixed.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root { --bg: #050505; --surface: #0f0f12; --accent: #8b5cf6; --border: #27272a; --text: #fafafa; }
        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* Navbar */
        nav { height: 70px; background: var(--surface); display: flex; align-items: center; justify-content: space-between; padding: 0 25px; border-bottom: 2px solid var(--accent); z-index: 100; flex-shrink: 0; }
        .logo-section { display: flex; align-items: center; gap: 12px; }
        .app-logo { width: 42px; height: 42px; border-radius: 10px; border: 1.5px solid var(--border); box-shadow: 0 0 15px var(--accent); object-fit: cover; }

        /* Google Account Area */
        #account-container { display: flex; align-items: center; }
        #user-profile { display: none; align-items: center; gap: 10px; background: rgba(139, 92, 246, 0.1); padding: 5px 12px; border-radius: 30px; border: 1px solid var(--accent); cursor: pointer; transition: 0.3s; }
        #user-profile:hover { background: rgba(139, 92, 246, 0.2); }
        #u-img { width: 32px; height: 32px; border-radius: 50%; border: 1px solid white; }
        #u-name { font-size: 13px; font-weight: 600; color: white; }

        /* Main Layout */
        .main-layout { display: flex; flex: 1; overflow: hidden; }
        .sidebar { width: 420px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 15px; gap: 12px; overflow-y: auto; }
        
        /* Chat History */
        #chat-window { flex: 1; background: #070708; border: 1px solid var(--border); border-radius: 10px; padding: 12px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; font-size: 0.85rem; }
        .msg { padding: 10px 14px; border-radius: 12px; max-width: 85%; line-height: 1.4; }
        .ai-msg { align-self: flex-start; background: #1a1a1e; color: #eee; border-left: 3px solid var(--accent); }
        .user-msg { align-self: flex-end; background: var(--accent); color: white; border-bottom-right-radius: 2px; }

        .input-field, select { background: #1a1a1e; border: 1px solid var(--border); color: white; padding: 10px; border-radius: 8px; width: 100%; outline: none; font-size: 0.85rem; box-sizing: border-box; }
        .btn-row { display: flex; gap: 8px; }
        .btn { flex: 1; border: none; color: white; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: 700; transition: 0.2s; display: flex; align-items: center; justify-content: center; gap: 6px; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.5px; }
        .btn-send { background: #18181b; border: 1px solid var(--accent); }
        .btn-execute { background: var(--accent); box-shadow: 0 4px 10px rgba(139, 92, 246, 0.3); }
        .btn:hover { filter: brightness(1.2); transform: translateY(-1px); }

        /* Workspace */
        .workspace { flex: 1; display: flex; flex-direction: column; background: #000; overflow: hidden; }
        .tab-bar { background: #111; display: flex; border-bottom: 1px solid var(--border); }
        .tab { padding: 10px 18px; cursor: pointer; font-size: 0.75rem; color: #71717a; border-right: 1px solid var(--border); }
        .tab.active { background: var(--surface); color: var(--accent); border-bottom: 2px solid var(--accent); font-weight: bold; }

        .editor-container { flex: 1; display: flex; flex-direction: column; min-height: 0; }
        .CodeMirror { flex: 1; font-size: 14px; height: 100% !important; }
        iframe { height: 35%; background: white; border-top: 4px solid var(--border); }
    </style>
</head>
<body>

<nav>
    <div class="logo-section">
        <img src="logo.jpeg" alt="L" class="app-logo">
        <h2 style="margin:0; font-size: 1.1rem; letter-spacing: 1px;">LuminaCode AI</h2>
    </div>
    
    <div id="account-container">
        <div id="g_id_onload" data-client_id="951427019725-o73a2mgth6qnd9bufkp6kjunn583u0k5.apps.googleusercontent.com" data-callback="handleSignIn"></div>
        <div class="g_id_signin" data-type="standard" data-theme="filled_black" data-shape="pill"></div>
        
        <div id="user-profile">
            <span id="u-name"></span>
            <img id="u-img" referrerpolicy="no-referrer">
        </div>
    </div>
</nav>

<div class="main-layout">
    <aside class="sidebar">
        <div id="chat-window">
            <div class="msg ai-msg"><b>LuminaCode AI:</b> System ready. Please sync your API key to begin.</div>
        </div>
        
        <input type="text" id="project-name" class="input-field" placeholder="Project Name (e.g. MyWebsite)...">

        <div style="background: rgba(255,255,255,0.02); padding: 10px; border-radius: 8px; border: 1px solid #222;">
            <label style="font-size: 9px; color: #71717a; display: block; margin-bottom: 5px;">API SETTINGS</label>
            <input type="password" id="api-key" class="input-field" placeholder="Gemini API Key...">
            <button class="btn" style="background:#111; margin-top:8px; width:100%; border:1px solid #333;" onclick="syncModels()">
                <i data-lucide="refresh-cw"></i> SYNC ENGINE
            </button>
        </div>

        <select id="model-select" class="input-field">
            <option value="">Select Engine...</option>
        </select>

        <textarea id="ai-prompt" class="input-field" style="height: 80px; resize:none;" placeholder="What are we building today?"></textarea>
        
        <div class="btn-row">
            <button class="btn btn-send" onclick="askAI()">
                <i data-lucide="send"></i> SEND
            </button>
            <button class="btn btn-execute" onclick="executeBuild()">
                <i data-lucide="play"></i> EXECUTE
            </button>
        </div>
        
        <button class="btn" style="background:#000; border: 1px solid #333;" onclick="downloadZip()">
            <i data-lucide="archive"></i> DOWNLOAD AS .ZIP
        </button>
    </aside>

    <div class="workspace">
        <div class="tab-bar">
            <div class="tab active" id="t-html" onclick="switchTab('html')">index.html</div>
            <div class="tab" id="t-css" onclick="switchTab('css')">style.css</div>
            <div class="tab" id="t-js" onclick="switchTab('js')">script.js</div>
        </div>
        <div class="editor-container">
            <textarea id="editor"></textarea>
        </div>
        <iframe id="preview"></iframe>
    </div>
</div>

<script>
    lucide.createIcons();
    let currentTab = 'html';
    let files = { html: '', css: '', js: '' };
    let lastGeneratedData = null;

    const cm = CodeMirror.fromTextArea(document.getElementById('editor'), {
        theme: "dracula", lineNumbers: true, mode: "htmlmixed", lineWrapping: true
    });

    // Google Sign-In Handler
    function handleSignIn(response) {
        const data = JSON.parse(atob(response.credential.split('.')[1]));
        document.querySelector('.g_id_signin').style.display = 'none'; // Remove button
        const profile = document.getElementById('user-profile');
        profile.style.display = 'flex'; // Show Account Button
        document.getElementById('u-name').innerText = data.given_name;
        document.getElementById('u-img').src = data.picture;
    }

    function switchTab(tab) {
        files[currentTab] = cm.getValue();
        currentTab = tab;
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById('t-' + tab).classList.add('active');
        cm.setOption('mode', tab === 'html' ? 'htmlmixed' : (tab === 'css' ? 'css' : 'javascript'));
        cm.setValue(files[tab] || '');
    }

    async function syncModels() {
        const key = document.getElementById('api-key').value.trim();
        try {
            const r = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${key}`);
            const d = await r.json();
            const sel = document.getElementById('model-select');
            sel.innerHTML = '';
            d.models.forEach(m => {
                if(m.supportedGenerationMethods.includes("generateContent")) {
                    const o = document.createElement('option');
                    o.value = m.name.split('/').pop();
                    o.innerText = o.value;
                    if(o.value.includes('flash')) o.selected = true;
                    sel.appendChild(o);
                }
            });
            addChatMessage("AI", "API Key synced successfully. Models loaded.");
        } catch(e) { alert("Invalid API Key."); }
    }

    function addChatMessage(role, text) {
        const win = document.getElementById('chat-window');
        const div = document.createElement('div');
        div.className = `msg ${role === 'User' ? 'user-msg' : 'ai-msg'}`;
        div.innerHTML = `<b>${role}:</b> ${text}`;
        win.appendChild(div);
        win.scrollTop = win.scrollHeight;
    }

    async function streamResponse(text) {
        const win = document.getElementById('chat-window');
        const div = document.createElement('div');
        div.className = 'msg ai-msg';
        div.innerHTML = `<b>LuminaCode AI:</b> `;
        win.appendChild(div);
        
        const chars = text.split('');
        for (let char of chars) {
            div.innerHTML += char;
            win.scrollTop = win.scrollHeight;
            await new Promise(r => setTimeout(r, 8));
        }
    }

    async function askAI() {
        const key = document.getElementById('api-key').value;
        const model = document.getElementById('model-select').value;
        const prompt = document.getElementById('ai-prompt').value;
        const pName = document.getElementById('project-name').value || "LuminaProject";

        if(!key || !model || !prompt) return alert("Setup API & Prompt!");

        addChatMessage("User", prompt);
        document.getElementById('ai-prompt').value = '';

        try {
            const r = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${key}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: `
                    System: You are LuminaCode AI (Model: ${model}). Project Title: ${pName}.
                    Rules:
                    1. ONLY Web Code.
                    2. If non-web: "I can only generate code for websites."
                    3. Live typing explanation in [STORY] tag.
                    4. Format: [STORY] text [/STORY] [HTML] code [/HTML] [CSS] code [/CSS] [JS] code [/JS].
                    5. Harmful: "I am not gonna generate a code for this."
                    6. Crew Info (ONLY if asked): "DarkFox Co. made me to help. Team: Boss and best Coder: Tobias, Coder: Denis & Simon, Helper: Liam".
                       If asked about Tobias: "Tobias is the Boss". Denis/Simon: "Lead Coders". Liam: "The Helper".

                    User Request: ${prompt}` }] }] })
            });
            const d = await r.json();
            const raw = d.candidates[0].content.parts[0].text;
            
            const story = raw.match(/\[STORY\](.*?)\[\/STORY\]/s)?.[1] || raw;
            lastGeneratedData = {
                html: raw.match(/\[HTML\](.*?)\[\/HTML\]/s)?.[1] || "",
                css: raw.match(/\[CSS\](.*?)\[\/CSS\]/s)?.[1] || "",
                js: raw.match(/\[JS\](.*?)\[\/JS\]/s)?.[1] || ""
            };

            await streamResponse(story.trim());
        } catch(e) { addChatMessage("AI", "Error: Connection to Engine failed."); }
    }

    function executeBuild() {
        if(!lastGeneratedData) return alert("No code received. Press SEND first.");
        files.html = lastGeneratedData.html;
        files.css = lastGeneratedData.css;
        files.js = lastGeneratedData.js;
        cm.setValue(files[currentTab]);
        updatePreview();
    }

    function updatePreview() {
        const doc = document.getElementById('preview').contentWindow.document;
        doc.open();
        doc.write(`${files.html}<style>${files.css}</style><script>${files.js}<\/script>`);
        doc.close();
    }

    function downloadZip() {
        const zip = new JSZip();
        const pName = document.getElementById('project-name').value || "LuminaProject";
        zip.file("index.html", files.html);
        zip.file("style.css", files.css);
        zip.file("script.js", files.js);
        zip.generateAsync({type:"blob"}).then(b => {
            const a = document.createElement('a');
            a.href = URL.createObjectURL(b);
            a.download = `${pName}.zip`;
            a.click();
        });
    }

    cm.on('change', () => { files[currentTab] = cm.getValue(); updatePreview(); });
    document.getElementById('api-key').value = localStorage.getItem('gemini_key') || '';
</script>
</body>
</html>
