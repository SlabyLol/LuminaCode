<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LuminaCode AI | Intelligent Executor</title>
    
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/theme/dracula.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/xml/xml.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/javascript/javascript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/css/css.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/htmlmixed/htmlmixed.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root {
            --bg: #0a0a0c;
            --surface: #16161a;
            --accent: #8b5cf6; /* Purple AI Theme */
            --accent-glow: rgba(139, 92, 246, 0.4);
            --border: #2d2d33;
            --text: #ececed;
        }

        body {
            margin: 0; font-family: 'Inter', sans-serif;
            background: var(--bg); color: var(--text);
            display: flex; flex-direction: column; height: 100vh; overflow: hidden;
        }

        /* Navbar & Auth */
        nav {
            height: 65px; background: var(--surface);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 20px; border-bottom: 1px solid var(--border);
        }
        .logo { font-weight: 800; color: var(--accent); display: flex; align-items: center; gap: 8px; }
        .user-section { display: flex; align-items: center; gap: 15px; }

        /* AI Sidebar */
        .main-layout { display: flex; flex: 1; overflow: hidden; }
        .ai-sidebar {
            width: 300px; background: var(--surface); border-right: 1px solid var(--border);
            display: flex; flex-direction: column; padding: 15px;
        }
        .ai-chat { flex: 1; overflow-y: auto; font-size: 13px; margin-bottom: 10px; border: 1px solid var(--border); border-radius: 8px; padding: 10px; background: #000; }
        .ai-input { background: #1a1a20; border: 1px solid var(--border); color: white; padding: 10px; border-radius: 6px; width: 100%; outline: none; }

        /* Workspace */
        .workspace { flex: 1; display: grid; grid-template-rows: 1fr 1fr; background: #000; }
        .CodeMirror { height: 100% !important; font-size: 14px; }
        iframe { width: 100%; height: 100%; border: none; background: white; }

        .btn-ai { background: var(--accent); border: none; color: white; padding: 8px; border-radius: 6px; cursor: pointer; margin-top: 5px; font-weight: bold; }
        
        #user-info { display: none; align-items: center; gap: 10px; }
        #user-info img { width: 32px; border-radius: 50%; }
    </style>
</head>
<body>

<nav>
    <div class="logo"><i data-lucide="bot"></i> LUMINACODE AI</div>
    <div class="user-section">
        <div id="g_id_onload"
             data-client_id="DEINE_GOOGLE_CLIENT_ID.apps.googleusercontent.com"
             data-callback="handleCredentialResponse">
        </div>
        <div class="g_id_signin" data-type="standard"></div>
        <div id="user-info">
            <span id="user-name"></span>
            <img id="user-pic" src="" alt="Profile">
        </div>
    </div>
</nav>

<div class="main-layout">
    <aside class="ai-sidebar">
        <h3>AI Assistant</h3>
        <input type="password" id="api-key" class="ai-input" placeholder="Enter Gemini API Key..." style="margin-bottom:10px">
        <div class="ai-chat" id="chat-output">Ask the AI to generate or fix code...</div>
        <textarea id="ai-prompt" class="ai-input" placeholder="e.g. 'Build a clock'"></textarea>
        <button class="btn-ai" onclick="askAI()">Generate Code ⚡</button>
    </aside>

    <div class="workspace">
        <div id="editor-wrapper"><textarea id="code-editor"></textarea></div>
        <iframe id="preview"></iframe>
    </div>
</div>

<script>
    lucide.createIcons();

    const editor = CodeMirror.fromTextArea(document.getElementById('code-editor'), {
        mode: "htmlmixed", theme: "dracula", lineNumbers: true
    });

    // --- Google Auth ---
    function handleCredentialResponse(response) {
        const payload = JSON.parse(atob(response.credential.split('.')[1]));
        document.querySelector('.g_id_signin').style.display = 'none';
        document.getElementById('user-info').style.display = 'flex';
        document.getElementById('user-name').innerText = payload.name;
        document.getElementById('user-pic').src = payload.picture;
        console.log("Logged in as: " + payload.email);
    }

    // --- Gemini AI Integration ---
    async function askAI() {
        const apiKey = document.getElementById('api-key').value;
        const prompt = document.getElementById('ai-prompt').value;
        const chatOutput = document.getElementById('chat-output');

        if (!apiKey) return alert("Please enter your Gemini API Key!");

        chatOutput.innerHTML = "Thinking...";

        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=${apiKey}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: `Generate only the HTML/CSS/JS code for: ${prompt}. Do not explain, just code.` }] }]
                })
            });

            const data = await response.json();
            let aiCode = data.candidates[0].content.parts[0].text;
            
            // Clean code block markdown if present
            aiCode = aiCode.replace(/```html|```/g, "");
            
            editor.setValue(aiCode);
            runCode();
            chatOutput.innerHTML = "Code updated!";
        } catch (error) {
            chatOutput.innerHTML = "Error: " + error.message;
        }
    }

    function runCode() {
        const previewFrame = document.getElementById('preview').contentWindow.document;
        previewFrame.open();
        previewFrame.write(editor.getValue());
        previewFrame.close();
    }

    editor.on('change', () => runCode());
</script>

</body>
</html>
