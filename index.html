<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="tab-title">LuminaCode AI | Pro</title>
    
    <link rel="icon" type="image/jpeg" href="logo.jpeg">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/theme/dracula.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/xml/xml.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/javascript/javascript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/css/css.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/htmlmixed/htmlmixed.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root { --bg: #050505; --surface: #0f0f12; --accent: #8b5cf6; --border: #27272a; --text: #fafafa; }
        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        nav { height: 70px; background: var(--surface); display: flex; align-items: center; justify-content: space-between; padding: 0 25px; border-bottom: 1px solid var(--border); }
        .logo-section { display: flex; align-items: center; gap: 15px; }
        .app-logo { width: 45px; height: 45px; border-radius: 12px; border: 2px solid var(--border); box-shadow: 0 0 20px rgba(139, 92, 246, 0.4); object-fit: cover; }
        
        .main-layout { display: flex; flex: 1; overflow: hidden; }
        .sidebar { width: 350px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 25px; gap: 20px; }
        .section-title { font-size: 0.75rem; text-transform: uppercase; color: #71717a; margin-bottom: 5px; display: flex; align-items: center; gap: 8px; }
        
        .input-group { position: relative; }
        .input-field, select { background: #070708; border: 1px solid var(--border); color: white; padding: 12px; border-radius: 10px; width: 100%; outline: none; font-size: 0.9rem; }
        .input-field:focus, select:focus { border-color: var(--accent); }
        
        .eye-btn { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: none; border: none; color: #71717a; cursor: pointer; }
        
        .btn { background: var(--accent); border: none; color: white; padding: 15px; border-radius: 10px; cursor: pointer; font-weight: 700; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn:hover { filter: brightness(1.2); }

        #user-profile { display: none; align-items: center; gap: 10px; background: #1a1a20; padding: 5px 12px; border-radius: 30px; border: 1.5px solid var(--accent); }
        #u-img { width: 30px; height: 30px; border-radius: 50%; }

        .workspace { flex: 1; display: grid; grid-template-rows: 1fr 1fr; background: #000; }
        .CodeMirror { height: 100% !important; }
        iframe { width: 100%; height: 100%; border: none; background: white; }
    </style>
</head>
<body>

<nav>
    <div class="logo-section">
        <img src="logo.jpeg" alt="L" class="app-logo" onerror="this.src='https://api.dicebear.com/7.x/bottts/svg?seed=Lumina'">
        <input type="text" id="project-title" style="background:none;border:none;color:white;font-weight:700;" value="Lumina-Project">
    </div>
    <div class="auth-container">
        <div id="g_id_onload" data-client_id="951427019725-o73a2mgth6qnd9bufkp6kjunn583u0k5.apps.googleusercontent.com" data-callback="handleSignIn"></div>
        <div class="g_id_signin" data-type="standard"></div>
        <div id="user-profile">
            <span id="u-name" style="font-size:13px"></span>
            <img id="u-img" referrerpolicy="no-referrer">
        </div>
    </div>
</nav>

<div class="main-layout">
    <aside class="sidebar">
        <div>
            <div class="section-title"><i data-lucide="key"></i> Gemini API Key</div>
            <div class="input-group">
                <input type="password" id="api-key" class="input-field" placeholder="Paste Key...">
                <button class="eye-btn" onclick="toggleKey()"><i id="eye-icon" data-lucide="eye"></i></button>
            </div>
        </div>

        <div>
            <div class="section-title"><i data-lucide="layers"></i> AI Model Selector</div>
            <select id="model-select">
                <option value="gemini-1.5-flash">Gemini 1.5 Flash (Recommended)</option>
                <option value="gemini-1.5-pro">Gemini 1.5 Pro (Powerful)</option>
                <option value="gemini-pro">Gemini Pro (Legacy)</option>
            </select>
        </div>
        
        <div>
            <div class="section-title"><i data-lucide="bot"></i> Prompt</div>
            <textarea id="ai-prompt" class="input-field" style="height: 120px; resize: none;" placeholder="What are we building?"></textarea>
            <button class="btn" style="margin-top: 15px; width:100%" onclick="generateCode()"><i data-lucide="sparkles"></i> Build</button>
        </div>
        
        <div id="status" style="font-size:12px; text-align:center;"></div>
        <button class="btn" style="background:#18181b; margin-top:auto" onclick="downloadFile()"><i data-lucide="download"></i> Download</button>
    </aside>

    <div class="workspace">
        <textarea id="editor"></textarea>
        <iframe id="preview"></iframe>
    </div>
</div>

<script>
    lucide.createIcons();
    const editor = CodeMirror.fromTextArea(document.getElementById('editor'), {
        mode: "htmlmixed", theme: "dracula", lineNumbers: true, autoCloseTags: true
    });

    document.getElementById('api-key').value = localStorage.getItem('gemini_key') || '';

    function toggleKey() {
        const input = document.getElementById('api-key');
        const icon = document.getElementById('eye-icon');
        const isPass = input.type === "password";
        input.type = isPass ? "text" : "password";
        icon.setAttribute("data-lucide", isPass ? "eye-off" : "eye");
        lucide.createIcons();
    }

    function handleSignIn(response) {
        const data = JSON.parse(atob(response.credential.split('.')[1]));
        document.querySelector('.g_id_signin').style.display = 'none';
        document.getElementById('user-profile').style.display = 'flex';
        document.getElementById('u-name').innerText = data.given_name;
        document.getElementById('u-img').src = data.picture;
    }

    async function generateCode() {
        const key = document.getElementById('api-key').value.trim();
        const model = document.getElementById('model-select').value;
        const prompt = document.getElementById('ai-prompt').value;
        const status = document.getElementById('status');

        if (!key || !prompt) return alert("Key or Prompt missing!");
        localStorage.setItem('gemini_key', key);
        status.innerText = "Building... ⚡";

        try {
            // Wir probieren v1beta, da diese die meisten Flash-Varianten unterstützt
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${key}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: `Return ONLY raw HTML/CSS/JS code for: ${prompt}. No markdown.` }] }] })
            });

            const result = await response.json();
            if (result.error) throw new Error(result.error.message);

            let code = result.candidates[0].content.parts[0].text;
            code = code.replace(/```html|```javascript|```css|```/gi, "").trim();
            
            editor.setValue(code);
            updatePreview();
            status.innerText = "Done! ✅";
        } catch (e) {
            status.innerText = "Error: " + e.message;
            console.error(e);
        }
    }

    function downloadFile() {
        const blob = new Blob([editor.getValue()], { type: "text/html" });
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = document.getElementById('project-title').value + ".html";
        a.click();
    }

    function updatePreview() {
        const doc = document.getElementById('preview').contentWindow.document;
        doc.open(); doc.write(editor.getValue()); doc.close();
    }
    editor.on('change', () => updatePreview());
</script>
</body>
</html>
