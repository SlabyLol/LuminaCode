<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LuminaCode AI | Master Workspace</title>
    
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/theme/dracula.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/xml/xml.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/javascript/javascript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/css/css.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/htmlmixed/htmlmixed.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root { --bg: #050505; --surface: #0f0f12; --accent: #8b5cf6; --border: #27272a; --text: #fafafa; }
        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* Navbar */
        nav { height: 70px; background: var(--surface); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; border-bottom: 2px solid var(--accent); z-index: 1000; flex-shrink: 0; }
        .nav-left { display: flex; align-items: center; gap: 15px; }
        .toggle-btn { background: #1a1a1e; border: 1px solid var(--border); color: white; padding: 8px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; }
        
        /* Account Badge */
        #user-profile { display: none; align-items: center; gap: 10px; background: rgba(139, 92, 246, 0.15); padding: 5px 12px; border-radius: 20px; border: 1px solid var(--accent); }
        #u-img { width: 30px; height: 30px; border-radius: 50%; border: 1px solid white; }

        /* Main Layout */
        .main-layout { display: flex; flex: 1; overflow: hidden; position: relative; }
        .sidebar { width: 380px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 15px; gap: 10px; transition: 0.3s ease; z-index: 900; }
        .sidebar.closed { margin-left: -380px; }

        #chat-window { flex: 1; background: #070708; border: 1px solid var(--border); border-radius: 10px; padding: 12px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; font-size: 13px; border-left: 4px solid var(--accent); }
        .msg { padding: 10px; border-radius: 10px; max-width: 85%; word-wrap: break-word; }
        .ai-msg { background: #1a1a1e; color: #ddd; align-self: flex-start; }
        .user-msg { background: var(--accent); color: white; align-self: flex-end; }

        .field { background: #16161a; border: 1px solid var(--border); color: white; padding: 10px; border-radius: 6px; width: 100%; box-sizing: border-box; font-size: 12px; outline: none; }
        .btn { border: none; color: white; padding: 10px; border-radius: 6px; cursor: pointer; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 6px; font-size: 11px; text-transform: uppercase; transition: 0.2s; }
        .btn-send { background: var(--accent); width: 100%; }

        /* Workspace & Tabs */
        .workspace { flex: 1; display: flex; flex-direction: column; background: #000; overflow: hidden; }
        .tab-bar { background: #111; display: flex; border-bottom: 1px solid var(--border); justify-content: space-between; align-items: center; padding-right: 10px; }
        .tabs { display: flex; }
        .tab { padding: 12px 20px; cursor: pointer; font-size: 12px; color: #666; border-right: 1px solid var(--border); }
        .tab.active { background: var(--surface); color: var(--accent); border-bottom: 2px solid var(--accent); font-weight: bold; }

        .editor-container { flex: 1; min-height: 0; }
        .CodeMirror { height: 100% !important; font-size: 14px; }

        /* Preview System */
        .preview-area { height: 40%; background: white; position: relative; border-top: 4px solid var(--border); }
        .preview-area.fullscreen { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 2000; border: none; }
        iframe { width: 100%; height: 100%; border: none; background: white; }
        
        .fs-btn { position: absolute; top: 10px; right: 10px; z-index: 2100; background: #000; color: #fff; border: 1px solid #444; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 11px; display: flex; align-items: center; gap: 5px; }
    </style>
</head>
<body>

<nav>
    <div class="nav-left">
        <button class="toggle-btn" onclick="toggleSidebar()"><i data-lucide="menu"></i></button>
        <h2 style="margin:0; font-size: 1.1rem; letter-spacing: 1px;">LuminaCode AI</h2>
    </div>
    
    <div id="account-section">
        <div id="g_id_onload" data-client_id="951427019725-o73a2mgth6qnd9bufkp6kjunn583u0k5.apps.googleusercontent.com" data-callback="handleSignIn"></div>
        <div class="g_id_signin" data-type="standard"></div>
        <div id="user-profile">
            <span id="u-name" style="font-size: 12px; font-weight: bold;"></span>
            <img id="u-img" referrerpolicy="no-referrer">
        </div>
    </div>
</nav>

<div class="main-layout">
    <aside class="sidebar" id="sidebar">
        <div id="chat-window">
            <div class="msg ai-msg"><b>LuminaCode AI:</b> System Active, Boss Tobias. Memory initialized.</div>
        </div>

        <input type="text" id="p-name" class="field" placeholder="Project Name...">
        <input type="password" id="api-key" class="field" placeholder="API Key...">
        <select id="model-select" class="field"><option value="">Sync to load models...</option></select>
        <textarea id="ai-prompt" class="field" style="height: 70px; resize:none;" placeholder="Talk to LuminaCode..."></textarea>
        
        <button class="btn btn-send" onclick="askAI()"><i data-lucide="send"></i> SEND</button>
        
        <div style="display:flex; gap:5px;">
            <button class="btn" style="background:#111; border:1px solid #333; flex:1;" onclick="syncModels()">SYNC</button>
            <button class="btn" style="background:var(--accent); flex:1;" onclick="executeCode()">RUN CODE</button>
        </div>
        <div style="display:flex; gap:5px;">
            <button class="btn" style="background:#000; border:1px solid #333; flex:1;" onclick="downloadZip()">EXPORT .ZIP</button>
            <button class="btn" style="background:#222; flex:1; color:#ff4444;" onclick="clearHistory()">CLEAR CHAT</button>
        </div>
    </aside>

    <div class="workspace">
        <div class="tab-bar">
            <div class="tabs">
                <div class="tab active" id="tab-html" onclick="switchTab('html')">index.html</div>
                <div class="tab" id="tab-css" onclick="switchTab('css')">style.css</div>
                <div class="tab" id="tab-js" onclick="switchTab('js')">script.js</div>
            </div>
            <span style="font-size: 9px; color: #444; font-weight: bold;">DARKFOX CO. SYSTEMS</span>
        </div>
        <div class="editor-container"><textarea id="editor"></textarea></div>
        <div class="preview-area" id="preview-wrapper">
            <button class="fs-btn" onclick="toggleFS()">
                <i data-lucide="maximize" style="width:14px;"></i> <span id="fs-text">Fullscreen</span>
            </button>
            <iframe id="preview"></iframe>
        </div>
    </div>
</div>

<script>
    lucide.createIcons();
    let currentTab = 'html', chatHistory = [];
    let files = { html: '', css: '', js: '' };

    const cm = CodeMirror.fromTextArea(document.getElementById('editor'), {
        theme: "dracula", lineNumbers: true, mode: "htmlmixed", lineWrapping: true
    });

    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('closed'); }
    function toggleFS() { 
        const wrap = document.getElementById('preview-wrapper');
        wrap.classList.toggle('fullscreen');
        document.getElementById('fs-text').innerText = wrap.classList.contains('fullscreen') ? 'Exit' : 'Fullscreen';
    }

    function switchTab(type) {
        files[currentTab] = cm.getValue(); 
        currentTab = type;
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById(`tab-${type}`).classList.add('active');
        const modeMap = { html: 'htmlmixed', css: 'css', js: 'javascript' };
        cm.setOption('mode', modeMap[type]);
        cm.setValue(files[type] || '');
        cm.refresh();
    }

    function handleSignIn(resp) {
        const payload = JSON.parse(atob(resp.credential.split('.')[1]));
        document.querySelector('.g_id_signin').style.display = 'none';
        const profile = document.getElementById('user-profile');
        profile.style.display = 'flex';
        document.getElementById('u-name').innerText = payload.name;
        document.getElementById('u-img').src = payload.picture;
        addChatMsg("AI", `Logged in as Boss ${payload.name}.`);
    }

    async function syncModels() {
        const key = document.getElementById('api-key').value;
        localStorage.setItem('boss_api_key', key);
        try {
            const r = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${key}`);
            const d = await r.json();
            const sel = document.getElementById('model-select');
            sel.innerHTML = '';
            d.models.forEach(m => {
                if(m.supportedGenerationMethods.includes("generateContent")) {
                    const o = document.createElement('option');
                    o.value = m.name.split('/').pop(); o.innerText = o.value;
                    if(o.value.includes('flash')) o.selected = true;
                    sel.appendChild(o);
                }
            });
            addChatMsg("AI", "Models synced, Tobias.");
        } catch(e) { addChatMsg("AI", "Sync error."); }
    }

    function addChatMsg(role, text) {
        const win = document.getElementById('chat-window');
        const div = document.createElement('div');
        div.className = `msg ${role === 'User' ? 'user-msg' : 'ai-msg'}`;
        div.innerHTML = `<b>${role}:</b> ${text}`;
        win.appendChild(div); win.scrollTop = win.scrollHeight;
    }

    function clearHistory() { chatHistory = []; addChatMsg("AI", "Context reset."); }

    async function askAI() {
        const prompt = document.getElementById('ai-prompt').value;
        const key = document.getElementById('api-key').value;
        const model = document.getElementById('model-select').value;
        if(!prompt || !key) return;

        addChatMsg("User", prompt);
        document.getElementById('ai-prompt').value = '';
        chatHistory.push({ role: "user", parts: [{ text: prompt }] });

        try {
            const r = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${key}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [
                        { role: "user", parts: [{ text: "IDENTITY: LuminaCode AI. Boss: Tobias. Crew: DarkFox Co. Rules: [STORY], [HTML], [CSS], [JS] tags mandatory. Web-only." }]},
                        ...chatHistory.slice(-10)
                    ]
                })
            });
            const d = await r.json();
            const raw = d.candidates[0].content.parts[0].text;
            chatHistory.push({ role: "model", parts: [{ text: raw }] });

            const story = raw.match(/\[STORY\](.*?)\[\/STORY\]/s)?.[1] || "Building...";
            files.html = raw.match(/\[HTML\](.*?)\[\/HTML\]/s)?.[1] || files.html;
            files.css = raw.match(/\[CSS\](.*?)\[\/CSS\]/s)?.[1] || files.css;
            files.js = raw.match(/\[JS\](.*?)\[\/JS\]/s)?.[1] || files.js;
            
            addChatMsg("AI", story.trim());
            executeCode();
        } catch(e) { addChatMsg("AI", "API Error."); }
    }

    function executeCode() {
        cm.setValue(files[currentTab]);
        const doc = document.getElementById('preview').contentWindow.document;
        doc.open();
        doc.write(`${files.html}<style>${files.css}</style><script>${files.js}<\/script>`);
        doc.close();
    }

    function downloadZip() {
        const zip = new JSZip();
        zip.file("index.html", files.html); zip.file("style.css", files.css); zip.file("script.js", files.js);
        zip.generateAsync({type:"blob"}).then(b => {
            const a = document.createElement('a'); a.href = URL.createObjectURL(b);
            a.download = `${document.getElementById('p-name').value || 'Project'}.zip`; a.click();
        });
    }

    document.getElementById('api-key').value = localStorage.getItem('boss_api_key') || '';
    cm.on('change', () => { 
        files[currentTab] = cm.getValue(); 
        const doc = document.getElementById('preview').contentWindow.document;
        doc.open(); doc.write(`${files.html}<style>${files.css}</style><script>${files.js}<\/script>`); doc.close();
    });
</script>
</body>
</html>
