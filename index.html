<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LuminaCode AI | Boss Workspace</title>
    
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/theme/dracula.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/xml/xml.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/javascript/javascript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/css/css.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/htmlmixed/htmlmixed.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root { --bg: #050505; --surface: #0f0f12; --accent: #8b5cf6; --border: #27272a; --text: #fafafa; }
        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* Navbar */
        nav { height: 70px; background: var(--surface); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; border-bottom: 2px solid var(--accent); z-index: 1100; flex-shrink: 0; }
        .nav-left { display: flex; align-items: center; gap: 15px; }
        .app-logo { width: 38px; height: 38px; border-radius: 8px; border: 1px solid var(--accent); box-shadow: 0 0 10px rgba(139, 92, 246, 0.3); }
        
        .toggle-btn { background: #1a1a1e; border: 1px solid var(--border); color: white; padding: 8px; border-radius: 8px; cursor: pointer; transition: 0.2s; }
        .toggle-btn:hover { border-color: var(--accent); color: var(--accent); }

        /* Google Account Area (Top Right) */
        #account-container { display: flex; align-items: center; }
        #user-profile { display: none; align-items: center; gap: 10px; background: rgba(139, 92, 246, 0.15); padding: 5px 15px; border-radius: 30px; border: 1px solid var(--accent); }
        #u-img { width: 32px; height: 32px; border-radius: 50%; border: 1px solid white; }
        #u-name { font-size: 13px; font-weight: bold; }

        /* Main Layout */
        .main-layout { display: flex; flex: 1; overflow: hidden; position: relative; }
        
        /* AI Sidebar */
        .sidebar { width: 400px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 15px; gap: 12px; transition: transform 0.4s ease; z-index: 1000; }
        .sidebar.closed { transform: translateX(-400px); position: absolute; height: 100%; }

        #chat-window { flex: 1; background: #070708; border: 1px solid var(--border); border-radius: 10px; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; font-size: 0.85rem; border-left: 3px solid var(--accent); }
        .msg { padding: 10px 14px; border-radius: 12px; max-width: 85%; word-wrap: break-word; }
        .ai-msg { align-self: flex-start; background: #1a1a1e; color: #eee; }
        .user-msg { align-self: flex-end; background: var(--accent); color: white; }

        .input-field { background: #1a1a1e; border: 1px solid var(--border); color: white; padding: 12px; border-radius: 8px; width: 100%; outline: none; font-size: 0.85rem; box-sizing: border-box; }
        .btn { border: none; color: white; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: 700; transition: 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; font-size: 0.7rem; text-transform: uppercase; }
        .btn-primary { background: var(--accent); width: 100%; }
        .btn-secondary { background: #111; border: 1px solid #333; }

        /* Editor & Preview */
        .workspace { flex: 1; display: flex; flex-direction: column; background: #000; overflow: hidden; transition: margin-left 0.4s; }
        .tab-bar { background: #111; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); padding-right: 10px; }
        .tabs { display: flex; }
        .tab { padding: 12px 20px; cursor: pointer; font-size: 0.8rem; color: #71717a; border-right: 1px solid var(--border); }
        .tab.active { background: var(--surface); color: var(--accent); border-bottom: 2px solid var(--accent); font-weight: bold; }

        .editor-container { flex: 1; min-height: 0; }
        .CodeMirror { height: 100% !important; font-size: 14px; }

        /* Preview Window */
        .preview-area { height: 40%; background: white; position: relative; border-top: 4px solid var(--border); }
        .preview-area.fullscreen { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 2000; border: none; }
        iframe { width: 100%; height: 100%; border: none; }

        .fs-control { position: absolute; top: 15px; right: 15px; z-index: 2100; }
        .fs-toggle-btn { background: rgba(0,0,0,0.8); color: white; border: 1px solid #444; padding: 8px 15px; border-radius: 6px; cursor: pointer; display: flex; align-items: center; gap: 8px; font-size: 12px; }
        .fs-toggle-btn:hover { background: var(--accent); border-color: white; }
    </style>
</head>
<body>

<nav>
    <div class="nav-left">
        <button class="toggle-btn" onclick="toggleAI()"><i data-lucide="layout-sidebar"></i></button>
        <img src="logo.jpeg" alt="L" class="app-logo">
        <h2 style="margin:0; font-size: 1.1rem; letter-spacing: 1px;">LuminaCode AI</h2>
    </div>
    
    <div id="account-container">
        <div id="g_id_onload" data-client_id="951427019725-o73a2mgth6qnd9bufkp6kjunn583u0k5.apps.googleusercontent.com" data-callback="handleSignIn"></div>
        <div class="g_id_signin" data-type="standard" data-theme="filled_black" data-shape="pill"></div>
        <div id="user-profile">
            <span id="u-name"></span>
            <img id="u-img" referrerpolicy="no-referrer">
        </div>
    </div>
</nav>

<div class="main-layout">
    <aside class="sidebar" id="sidebar">
        <div id="chat-window">
            <div class="msg ai-msg"><b>System:</b> LuminaCode AI online. Welcome back, Tobias. (Boss & Best Coder mode active)</div>
        </div>

        <input type="text" id="proj-name" class="input-field" placeholder="Project Name...">
        <input type="password" id="api-key" class="input-field" placeholder="Gemini API Key...">
        <select id="model-select" class="input-field"><option value="">Wait for Sync...</option></select>

        <textarea id="ai-prompt" class="input-field" style="height: 100px; resize:none;" placeholder="Talk to LuminaCode AI..."></textarea>
        
        <button class="btn btn-primary" onclick="askAI()"><i data-lucide="send"></i> SEND TO AI</button>
        
        <div style="display:flex; gap:8px;">
            <button class="btn btn-secondary" style="flex:1;" onclick="syncModels()"><i data-lucide="refresh-cw"></i> SYNC</button>
            <button class="btn btn-secondary" style="flex:1;" onclick="executeCode()"><i data-lucide="play"></i> RUN</button>
        </div>
        
        <div style="display:flex; gap:8px;">
            <button class="btn btn-secondary" style="flex:1; font-size:9px;" onclick="downloadZip()"><i data-lucide="archive"></i> ZIP EXPORT</button>
            <button class="btn btn-secondary" style="flex:1; font-size:9px; color:#ff4444;" onclick="clearChat()"><i data-lucide="trash-2"></i> CLEAR</button>
        </div>
    </aside>

    <div class="workspace">
        <div class="tab-bar">
            <div class="tabs">
                <div class="tab active" id="t-html" onclick="switchTab('html')">index.html</div>
                <div class="tab" id="t-css" onclick="switchTab('css')">style.css</div>
                <div class="tab" id="t-js" onclick="switchTab('js')">script.js</div>
            </div>
            <span style="font-size: 10px; color: #444; margin-right: 15px; font-weight: bold;">DARKFOX CO. WORKSPACE</span>
        </div>

        <div class="editor-container"><textarea id="editor"></textarea></div>

        <div class="preview-area" id="preview-wrapper">
            <div class="fs-control">
                <button class="fs-toggle-btn" onclick="toggleFS()">
                    <i data-lucide="maximize" id="fs-icon"></i> <span id="fs-text">Fullscreen</span>
                </button>
            </div>
            <iframe id="preview"></iframe>
        </div>
    </div>
</div>

<script>
    lucide.createIcons();
    let currentTab = 'html', chatHistory = [], lastData = null;
    let files = { html: '', css: '', js: '' };

    const cm = CodeMirror.fromTextArea(document.getElementById('editor'), {
        theme: "dracula", lineNumbers: true, mode: "htmlmixed", lineWrapping: true
    });

    // Sidebar Toggle
    function toggleAI() { document.getElementById('sidebar').classList.toggle('closed'); }

    // Fullscreen Toggle
    function toggleFS() {
        const wrap = document.getElementById('preview-wrapper');
        const icon = document.getElementById('fs-icon');
        const text = document.getElementById('fs-text');
        wrap.classList.toggle('fullscreen');
        const isFS = wrap.classList.contains('fullscreen');
        icon.setAttribute('data-lucide', isFS ? 'minimize' : 'maximize');
        text.innerText = isFS ? 'Exit Fullscreen' : 'Fullscreen';
        lucide.createIcons();
    }

    // Google Sign-In
    function handleSignIn(resp) {
        const data = JSON.parse(atob(resp.credential.split('.')[1]));
        document.querySelector('.g_id_signin').style.display = 'none';
        document.getElementById('user-profile').style.display = 'flex';
        document.getElementById('u-name').innerText = data.given_name;
        document.getElementById('u-img').src = data.picture;
    }

    // API Sync
    async function syncModels() {
        const key = document.getElementById('api-key').value;
        const r = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${key}`);
        const d = await r.json();
        const sel = document.getElementById('model-select'); sel.innerHTML = '';
        d.models.forEach(m => {
            if(m.supportedGenerationMethods.includes("generateContent")) {
                const o = document.createElement('option');
                o.value = m.name.split('/').pop(); o.innerText = o.value;
                if(o.value.includes('flash')) o.selected = true;
                sel.appendChild(o);
            }
        });
        addChatMsg("AI", "Models synced. Systems ready for Boss Tobias.");
    }

    function addChatMsg(role, text) {
        const win = document.getElementById('chat-window');
        const div = document.createElement('div');
        div.className = `msg ${role === 'User' ? 'user-msg' : 'ai-msg'}`;
        div.innerHTML = `<b>${role}:</b> ${text}`;
        win.appendChild(div); win.scrollTop = win.scrollHeight;
    }

    function clearChat() { chatHistory = []; addChatMsg("AI", "Memory cleared."); }

    // AI Request with Memory
    async function askAI() {
        const prompt = document.getElementById('ai-prompt').value;
        const key = document.getElementById('api-key').value;
        const model = document.getElementById('model-select').value;
        if(!prompt || !key) return alert("Missing Prompt or API Key!");

        addChatMsg("User", prompt);
        document.getElementById('ai-prompt').value = '';
        chatHistory.push({ role: "user", parts: [{ text: prompt }] });

        try {
            const r = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${key}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [
                        { role: "user", parts: [{ text: `
                            LuminaCode AI Identity:
                            1. Boss: Tobias (Best coder in the crew).
                            2. Crew: DarkFox Co. (Denis, Simon, Liam).
                            3. Rules: Web only, output must contain [STORY], [HTML], [CSS], [JS] tags.
                            4. Tobias allowed you to share crew info.
                            Current Memory context below:` 
                        }]},
                        ...chatHistory.slice(-10)
                    ]
                })
            });
            const d = await r.json();
            const raw = d.candidates[0].content.parts[0].text;
            chatHistory.push({ role: "model", parts: [{ text: raw }] });

            const story = raw.match(/\[STORY\](.*?)\[\/STORY\]/s)?.[1] || raw;
            lastData = {
                html: raw.match(/\[HTML\](.*?)\[\/HTML\]/s)?.[1] || "",
                css: raw.match(/\[CSS\](.*?)\[\/CSS\]/s)?.[1] || "",
                js: raw.match(/\[JS\](.*?)\[\/JS\]/s)?.[1] || ""
            };
            addChatMsg("AI", story.trim());
        } catch(e) { addChatMsg("AI", "Error in engine or key."); }
    }

    function executeCode() {
        if(!lastData) return alert("Ask AI for code first!");
        files = { ...lastData };
        cm.setValue(files[currentTab]);
        updatePreview();
    }

    function updatePreview() {
        const doc = document.getElementById('preview').contentWindow.document;
        doc.open();
        doc.write(`${files.html}<style>${files.css}</style><script>${files.js}<\/script>`);
        doc.close();
    }

    function switchTab(t) {
        files[currentTab] = cm.getValue();
        currentTab = t;
        cm.setOption('mode', t === 'html' ? 'htmlmixed' : (t === 'css' ? 'css' : 'javascript'));
        cm.setValue(files[t] || '');
    }

    function downloadZip() {
        const zip = new JSZip();
        zip.file("index.html", files.html);
        zip.file("style.css", files.css);
        zip.file("script.js", files.js);
        zip.generateAsync({type:"blob"}).then(b => {
            const a = document.createElement('a'); a.href = URL.createObjectURL(b);
            a.download = `${document.getElementById('proj-name').value || 'DarkFoxProject'}.zip`; a.click();
        });
    }

    cm.on('change', () => { files[currentTab] = cm.getValue(); updatePreview(); });
</script>
</body>
</html>
