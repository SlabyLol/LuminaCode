<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LuminaCode AI | Pro Developer Workspace</title>
    
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/theme/dracula.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/xml/xml.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/javascript/javascript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/css/css.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/htmlmixed/htmlmixed.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root { 
            --bg: #030303; --surface: #0a0a0c; --accent: #8b5cf6; 
            --accent-glow: rgba(139, 92, 246, 0.4); --border: #1f1f23; --text: #f4f4f5; 
        }
        
        * { box-sizing: border-box; }
        body { margin: 0; font-family: 'Inter', -apple-system, sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* Navigation & Profile */
        nav { 
            height: 70px; background: var(--surface); display: flex; align-items: center; 
            justify-content: space-between; padding: 0 25px; border-bottom: 2px solid var(--accent); z-index: 1000; 
        }
        .nav-logo { font-weight: 900; letter-spacing: 3px; color: var(--accent); display: flex; align-items: center; gap: 10px; }
        .nav-right { display: flex; align-items: center; gap: 15px; }
        
        #profile-section { display: none; align-items: center; gap: 12px; background: #16161a; padding: 6px 15px; border-radius: 50px; border: 1px solid var(--border); }
        #u-avatar { width: 34px; height: 34px; border-radius: 50%; border: 2px solid var(--accent); }
        #u-name { font-size: 12px; font-weight: 700; color: var(--text); }

        /* Main Workspace Container */
        .app-shell { display: flex; flex: 1; overflow: hidden; position: relative; }
        
        /* Sidebar Styles */
        .sidebar { 
            width: 420px; background: var(--surface); border-right: 1px solid var(--border); 
            display: flex; flex-direction: column; padding: 20px; gap: 12px; 
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); z-index: 900; 
        }
        .sidebar.collapsed { transform: translateX(-420px); position: absolute; }

        /* Chat System */
        #chat-stream { 
            flex: 1; background: #000; border: 1px solid var(--border); border-radius: 12px; 
            padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; 
            font-size: 13px; border-left: 4px solid var(--accent); 
        }
        .msg { padding: 12px 16px; border-radius: 14px; max-width: 88%; line-height: 1.5; word-wrap: break-word; }
        .ai-msg { background: #111; color: #ddd; align-self: flex-start; border: 1px solid #222; }
        .user-msg { background: var(--accent); color: white; align-self: flex-end; box-shadow: 0 4px 10px var(--accent-glow); }

        /* Input Controls */
        .ctrl { background: #111; border: 1px solid var(--border); color: white; padding: 14px; border-radius: 10px; width: 100%; box-sizing: border-box; font-size: 13px; outline: none; transition: 0.2s; }
        .ctrl:focus { border-color: var(--accent); background: #16161a; }
        
        .btn { 
            border: none; color: white; padding: 14px; border-radius: 10px; cursor: pointer; 
            font-weight: 800; display: flex; align-items: center; justify-content: center; 
            gap: 10px; font-size: 12px; text-transform: uppercase; transition: 0.3s; 
        }
        .btn-main { background: var(--accent); width: 100%; box-shadow: 0 4px 15px var(--accent-glow); }
        .btn-main:hover { filter: brightness(1.2); transform: translateY(-2px); }
        .btn-sec { background: #1a1a1e; border: 1px solid var(--border); flex: 1; }

        /* Workspace & Editor Area */
        .workspace { flex: 1; display: flex; flex-direction: column; background: #000; overflow: hidden; }
        .tab-bar { background: #0d0d0f; display: flex; border-bottom: 1px solid var(--border); justify-content: space-between; }
        .tabs { display: flex; }
        .tab { 
            padding: 15px 25px; cursor: pointer; font-size: 12px; color: #555; 
            border-right: 1px solid var(--border); font-weight: 700; transition: 0.2s; 
        }
        .tab.active { background: var(--surface); color: var(--accent); border-bottom: 3px solid var(--accent); }

        .editor-box { flex: 1; min-height: 0; }
        .CodeMirror { height: 100% !important; font-size: 15px; font-family: 'Fira Code', monospace; }

        /* Preview Window */
        .preview-pane { height: 42%; background: #fff; position: relative; border-top: 5px solid var(--border); }
        .preview-pane.maximized { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 2000; }
        iframe { width: 100%; height: 100%; border: none; }
        .pane-tools { position: absolute; top: 15px; right: 20px; z-index: 2100; display: flex; gap: 8px; }
        .tool-btn { background: #000; color: #fff; border: 1px solid #444; padding: 8px 15px; border-radius: 6px; cursor: pointer; font-size: 11px; font-weight: bold; }
    </style>
</head>
<body>

<nav>
    <div class="nav-left">
        <button class="btn" style="background:#1a1a1e; padding: 10px;" onclick="toggleSidebar()"><i data-lucide="menu"></i></button>
        <div class="nav-logo">
            <i data-lucide="terminal"></i>
            <span>LUMINACODE AI</span>
        </div>
    </div>
    <div class="nav-right">
        <div id="g_id_onload" data-client_id="951427019725-o73a2mgth6qnd9bufkp6kjunn583u0k5.apps.googleusercontent.com" data-callback="handleSignIn"></div>
        <div class="g_id_signin" data-type="standard" data-theme="filled_black" data-shape="pill"></div>
        <div id="profile-section">
            <span id="u-name"></span>
            <img id="u-avatar" referrerpolicy="no-referrer">
        </div>
    </div>
</nav>

<div class="app-shell">
    <aside class="sidebar" id="sidebar">
        <div id="chat-stream">
            <div class="msg ai-msg"><b>System:</b> Neural engine ready. Awaiting build instructions.</div>
        </div>
        
        <input type="text" id="project-title" class="ctrl" placeholder="Project Name...">
        <input type="password" id="api-key" class="ctrl" placeholder="Gemini API Key...">
        <select id="model-select" class="ctrl"><option value="">Sync to load models...</option></select>
        
        <textarea id="ai-input" class="ctrl" style="height: 100px; resize: none;" placeholder="Command LuminaCode AI..."></textarea>
        
        <button class="btn btn-main" onclick="executeAI()"><i data-lucide="cpu"></i> SEND COMMAND</button>
        
        <div style="display:flex; gap:10px;">
            <button class="btn btn-sec" onclick="syncAPI()"><i data-lucide="refresh-cw" style="width:14px;"></i> SYNC</button>
            <button class="btn btn-sec" onclick="exportProject()"><i data-lucide="download" style="width:14px;"></i> ZIP</button>
        </div>
        <button class="btn" style="background:#221111; color:#ff5555; border:1px solid #442222;" onclick="clearHistory()"><i data-lucide="trash-2" style="width:14px;"></i> CLEAR CONTEXT</button>
    </aside>

    <main class="workspace">
        <div class="tab-bar">
            <div class="tabs">
                <div class="tab active" id="tab-html" onclick="switchTab('html')">index.html</div>
                <div class="tab" id="tab-css" onclick="switchTab('css')">style.css</div>
                <div class="tab" id="tab-js" onclick="switchTab('js')">script.js</div>
            </div>
            <div style="font-size: 10px; color: #444; margin-right: 20px; font-weight: 900; align-self: center;">V.2026_MASTER</div>
        </div>
        
        <div class="editor-box"><textarea id="code-editor"></textarea></div>
        
        <div class="preview-pane" id="preview-wrapper">
            <div class="pane-tools">
                <button class="tool-btn" onclick="forceRender()">REFRESH</button>
                <button class="tool-btn" onclick="toggleFS()">FULLSCREEN</button>
            </div>
            <iframe id="preview-frame"></iframe>
        </div>
    </main>
</div>

<script>
    lucide.createIcons();
    let currentTab = 'html', chatHistory = [];
    let projectFiles = { 
        html: '<!DOCTYPE html>\n<html>\n<head></head>\n<body>\n  <h1>New Project</h1>\n</body>\n</html>', 
        css: 'body { background: #f0f0f0; font-family: sans-serif; }', 
        js: '// Script starts here' 
    };

    const editor = CodeMirror.fromTextArea(document.getElementById('code-editor'), {
        theme: "dracula", lineNumbers: true, mode: "htmlmixed", 
        lineWrapping: true, extraKeys: {"Ctrl-Space": "autocomplete"}
    });

    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('collapsed'); }
    function toggleFS() { document.getElementById('preview-wrapper').classList.toggle('maximized'); }
    function clearHistory() { chatHistory = []; document.getElementById('chat-stream').innerHTML = '<div class="msg ai-msg"><b>System:</b> Context purged. Ready for new build.</div>'; }

    // TAB SWITCHING (No data loss)
    function switchTab(type) {
        projectFiles[currentTab] = editor.getValue();
        currentTab = type;
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById(`tab-${type}`).classList.add('active');
        
        const modes = { html: 'htmlmixed', css: 'css', js: 'javascript' };
        editor.setOption('mode', modes[type]);
        editor.setValue(projectFiles[type]);
        editor.refresh();
    }

    // AUTH LOGIC
    function handleSignIn(resp) {
        const user = JSON.parse(atob(resp.credential.split('.')[1]));
        document.querySelector('.g_id_signin').style.display = 'none';
        document.getElementById('profile-section').style.display = 'flex';
        document.getElementById('u-name').innerText = user.name.toUpperCase();
        document.getElementById('u-avatar').src = user.picture;
        postMsg("LuminaCode AI", `User authentication verified. Welcome, **${user.given_name}**.`);
    }

    // API SYNC
    async function syncAPI() {
        const key = document.getElementById('api-key').value;
        localStorage.setItem('lumina_boss_key', key);
        try {
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${key}`);
            const data = await res.json();
            const sel = document.getElementById('model-select');
            sel.innerHTML = '';
            data.models.forEach(m => {
                if(m.supportedGenerationMethods.includes("generateContent")) {
                    const opt = document.createElement('option');
                    opt.value = m.name.split('/').pop(); opt.innerText = opt.value;
                    if(opt.value.includes('flash')) opt.selected = true;
                    sel.appendChild(opt);
                }
            });
            postMsg("LuminaCode AI", "Models synchronized. Performance optimized.");
        } catch(e) { postMsg("LuminaCode AI", "Error: Invalid API Key or Network failure."); }
    }

    function postMsg(role, text) {
        const win = document.getElementById('chat-stream');
        const div = document.createElement('div');
        div.className = `msg ${role === 'You' ? 'user-msg' : 'ai-msg'}`;
        div.innerHTML = `<b>${role}:</b> ${text}`;
        win.appendChild(div); win.scrollTop = win.scrollHeight;
    }

    // AI ENGINE
    async function executeAI() {
        const prompt = document.getElementById('ai-input').value;
        const key = document.getElementById('api-key').value;
        const model = document.getElementById('model-select').value;
        if(!prompt || !key) return;

        postMsg("You", prompt);
        document.getElementById('ai-input').value = '';
        chatHistory.push({ role: "user", parts: [{ text: prompt }] });

        try {
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${key}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [
                        { role: "user", parts: [{ text: "IDENTITY: LuminaCode AI. Rules: Full Web Dev mode. Tobias is the Boss internally. Return format: [STORY] Explanation [/STORY] [HTML] code [/HTML] [CSS] code [/CSS] [JS] code [/JS]. Be professional and direct." }]},
                        ...chatHistory.slice(-14)
                    ]
                })
            });
            const data = await res.json();
            const raw = data.candidates[0].content.parts[0].text;
            chatHistory.push({ role: "model", parts: [{ text: raw }] });

            const story = raw.match(/\[STORY\](.*?)\[\/STORY\]/s)?.[1] || raw;
            projectFiles.html = raw.match(/\[HTML\](.*?)\[\/HTML\]/s)?.[1] || projectFiles.html;
            projectFiles.css = raw.match(/\[CSS\](.*?)\[\/CSS\]/s)?.[1] || projectFiles.css;
            projectFiles.js = raw.match(/\[JS\](.*?)\[\/JS\]/s)?.[1] || projectFiles.js;
            
            postMsg("LuminaCode AI", story.trim());
            forceRender();
        } catch(e) { postMsg("LuminaCode AI", "Error: Neural connection interrupted."); }
    }

    function forceRender() {
        editor.setValue(projectFiles[currentTab]);
        const frame = document.getElementById('preview-frame').contentWindow.document;
        frame.open();
        frame.write(`${projectFiles.html}<style>${projectFiles.css}</style><script>${projectFiles.js}<\/script>`);
        frame.close();
    }

    function exportProject() {
        const zip = new JSZip();
        zip.file("index.html", projectFiles.html);
        zip.file("style.css", projectFiles.css);
        zip.file("script.js", projectFiles.js);
        zip.generateAsync({type:"blob"}).then(b => {
            const a = document.createElement('a'); a.href = URL.createObjectURL(b);
            a.download = `${document.getElementById('project-title').value || 'Source_Code'}.zip`; 
            a.click();
        });
    }

    // Init & Persistence
    document.getElementById('api-key').value = localStorage.getItem('lumina_boss_key') || '';
    editor.setValue(projectFiles[currentTab]);
    
    editor.on('change', () => { 
        projectFiles[currentTab] = editor.getValue(); 
        const frame = document.getElementById('preview-frame').contentWindow.document;
        frame.open(); 
        frame.write(`${projectFiles.html}<style>${projectFiles.css}</style><script>${projectFiles.js}<\/script>`); 
        frame.close();
    });
</script>
</body>
</html>
